[pytest]
minversion = 7.0

testpaths =
    tests/backend
    tests/core

# Legacy test trees under tests/application|domain|rh_rules target removed modules
# and currently break collection; backend/core are the maintained suites.

python_files =
    test_*.py

addopts =
    -ra
    --cov=core
    --cov=backend
    --cov-report=term-missing

markers =
    unit: tests unitaires (rapides, sans DB)
    integration: tests avec DB / services / repos
    flow: tests end-to-end backend (auth, RBAC, flows métier)
    slow: tests lents (sleep, multi-clients, etc.)
    rh: RH rules engine tests
    planning: Planning solver tests

filterwarnings =
    ignore:Accessing argon2\.__version__ is deprecated:DeprecationWarning
